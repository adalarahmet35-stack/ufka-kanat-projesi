<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UFKA KANAT V5 - PROJE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #arayuz { position: absolute; top: 10px; left: 10px; color: #00ff00; z-index: 100; font-family: monospace; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; background: rgba(0,0,0,0.8); padding: 30px; border: 2px solid #00ff00; }
        button { background: #00ff00; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="arayuz" style="display:none;">
        <div>PUAN: <span id="p">0</span></div>
        <div>BATARYA: %<span id="b">100</span></div>
    </div>

    <div id="menu">
        <h1>UFKA KANAT V5</h1>
        <p>Ahmet Said Adalar | Ömer Pile | Kerem Karaca</p>
        <button onclick="baslat()">SİMÜLASYONU BAŞLAT</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SENİN KODUNDAKİ DEĞİŞKENLER VE MANTIK ---
        let scene, camera, renderer, drone;
        let points = 0, battery = 100, isRunning = false;
        let pos = new THREE.Vector3(0, 10, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        let rings = [];
        const keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Senin Fog Rengin
            scene.fog = new THREE.Fog(0x87ceeb, 100, 5000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Zemin (Ground)
            const gGeo = new THREE.PlaneGeometry(10000, 10000);
            const gMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
            const ground = new THREE.Mesh(gGeo, gMat);
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // DRON (GeoFactory.make_box mantığı)
            const dGeo = new THREE.BoxGeometry(1.5, 0.5, 1.5);
            const dMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            drone = new THREE.Mesh(dGeo, dMat);
            scene.add(drone);

            // HALKALAR (75 adet - GeoFactory.make_ring mantığı)
            for(let i=0; i<75; i++) {
                const rGeo = new THREE.TorusGeometry(7, 0.7, 16, 64);
                const rMat = new THREE.MeshStandardMaterial({ color: (i % 3 == 0) ? 0x00ffff : 0xff0000, emissive: 0x00ffff, emissiveIntensity: 0.5 });
                const ring = new THREE.Mesh(rGeo, rMat);
                ring.position.set(Math.random()*400 - 200, 20 + Math.random()*50, i * 150 + 200);
                scene.add(ring);
                rings.push(ring);
            }

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isRunning) {
                // Fizik ve Hareket (Senin Python formüllerin)
                const dt = 0.016;
                const speed = 60;

                if(keys['KeyW']) vel.z += speed * dt;
                if(keys['KeyS']) vel.z -= speed * dt;
                if(keys['KeyA']) drone.rotation.y += 0.05;
                if(keys['KeyD']) drone.rotation.y -= 0.05;
                if(keys['Space']) pos.y += 0.5;

                pos.x += vel.x; pos.y += vel.y; pos.z += vel.z;
                vel.multiplyScalar(0.95); // Sürtünme

                drone.position.copy(pos);
                camera.position.set(pos.x, pos.y + 5, pos.z - 15);
                camera.lookAt(pos.x, pos.y, pos.z + 20);

                // Çarpışma Kontrolü
                rings.forEach(r => {
                    if(r.visible && pos.distanceTo(r.position) < 8) {
                        r.visible = false;
                        points += 100;
                        document.getElementById('p').innerText = points;
                    }
                });

                battery -= 0.01;
                document.getElementById('b').innerText = Math.floor(battery);
                if(battery <= 0) location.reload();
            }
            renderer.render(scene, camera);
        }

        window.baslat = function() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('arayuz').style.display = 'block';
            isRunning = true;
        }

        init();
    </script>
</body>
</html>

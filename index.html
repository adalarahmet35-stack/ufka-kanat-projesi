<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython_stdlib.js"></script>
    <title>Ufka Kanat VR</title>
    <style>
        body { margin: 0; background-color: black; color: #00ff00; text-align: center; font-family: sans-serif; }
        canvas { display: block; margin: 20px auto; border: 1px solid #333; }
    </style>
</head>
<body onload="brython()">
    <h1>UFKA KANAT: HALKA SİMÜLASYONU</h1>
    <p id="msg">Yükleniyor...</p>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script type="text/python">
from browser import document, window, timer
import math

canvas = document["gameCanvas"]
ctx = canvas.getContext("2d")

# Sabit boyut verelim ki risk olmasın
canvas.width = 800
canvas.height = 600

def draw(t):
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    cx, cy = canvas.width / 2, canvas.height / 2
    
    # 3 Renkli Halka
    colors = ["#00ffff", "#ff00ff", "#ffff00"]
    for i, color in enumerate(colors):
        radius = 50 + (i * 50) + math.sin(t/500 + i) * 10
        ctx.beginPath()
        ctx.arc(cx, cy, radius, 0, 2 * math.pi)
        ctx.strokeStyle = color
        ctx.lineWidth = 5
        ctx.stroke()

def animate(t):
    draw(t)
    window.requestAnimationFrame(animate)

# Yazıyı güncelle ve başlat
document["msg"].text = "Halkalar Yüklendi! Gözlüğü Takabilirsin."
animate(0)

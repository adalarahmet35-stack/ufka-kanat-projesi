<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython_stdlib.js"></script>
    <title>Ufka Kanat VR</title>
    <style>
        body { margin: 0; background-color: black; color: #00ff00; text-align: center; font-family: sans-serif; }
        canvas { display: block; margin: 20px auto; border: 1px solid #333; }
    </style>
</head>
<body onload="brython()">
    <h1>UFKA KANAT: HALKA SİMÜLASYONU</h1>
    <p id="msg">Yükleniyor...</p>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script type="text/python">
from browser import document, window
import math

canvas = document["gameCanvas"]
ctx = canvas.getContext("2d")

def animate(t):
    ctx.clearRect(0, 0, 800, 600)
    # 3 Farklı Halka Çizimi
    for i, color in enumerate(['#00ffff', '#ff00ff', '#ffff00']):
        radius = 100 + (i * 40) + math.sin(t/500 + i) * 15
        ctx.beginPath()
        ctx.arc(400, 300, radius, 0, 2 * math.pi)
        ctx.strokeStyle = color
        ctx.lineWidth = 5
        ctx.stroke()
    
    document["msg"].text = "Sistem Aktif: Halkalar Dönüyor"
    window.requestAnimationFrame(animate)

animate(0)
    </script>
</body>
</html>
